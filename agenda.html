<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda de Contactos</title>
</head>

<body>

<h1>Agenda de Contactos</h1>
 <!-- IMPUTS PRINCIALES -->
<label>Nombre:</label><br> 
<input type="text" id="nombre"><br>   

<label>Dirección:</label><br>
<input type="text" id="direccion"><br>

<label>Teléfono:</label><br>
<input type="text" id="telefono"><br>

<label>Correo:</label><br>
<input type="text" id="correo"><br>

<label>URL Foto:</label><br>
<input type="text" id="foto"><br><br>

<button onclick="agregar()">Agregar</button> <!-- BOTON AGREGAR -->
<button onclick="limpiar()">Limpiar</button>  <!-- BOTON LIMPIAR -->

<br><br>

<label>Buscar:</label>    <!-- LABEL BUSCAR -->
<input type="text" id="buscar"> 
<button onclick="buscar()">Buscar</button>  

<h2>Contactos</h2>
<div id="lista"></div>

<script>
let contactos = JSON.parse(localStorage.getItem("agenda")) || []; // se obtiene el contenido de localStorage

function agregar(){     // FUNCION PARA AGREGAR
    // se toman los datos que el usuario escribió en los inputs
    let nombre = document.getElementById("nombre").value;
    let direccion = document.getElementById("direccion").value;
    let telefono = document.getElementById("telefono").value;
    let correo = document.getElementById("correo").value;
    let foto = document.getElementById("foto").value;

    // este es el objeto literal
    let contacto = {
        nombre: nombre,       // propiedad : valor
        direccion: direccion, // y el segundo "nombre" es la variable que obtuvimos de input
        telefono: telefono,   // basicamente lo que escriba el usuario
        correo: correo,
        foto: foto
    };

    contactos.push(contacto);                     // agregamos el contacto al arreglo
    localStorage.setItem("agenda", JSON.stringify(contactos)); // guardamos en localStorage
    mostrar(); // actualizar la lista inmediatamente
}

function mostrar(){     // FUNCION PARA MOSTRAR
    let lista = document.getElementById("lista");     // se obtiene el elemento con id "lista"
    lista.innerHTML = "";    

    contactos.forEach(function(contacto, indice){    // se itera sobre cada contacto
        lista.innerHTML += `        
        <li>
        <b>${contacto.nombre}</b><br>     
        Direccion: ${contacto.direccion}<br>
        Telefono: ${contacto.telefono}<br>
        Correo: ${contacto.correo}<br>
        <img src="${contacto.foto}" width="80"><br>
        <button onclick="editar(${indice})">Editar</button> <!-- BOTON EDITAR AGREGADO -->
        <button onclick="eliminar(${indice})">Eliminar</button>    
        </li>
        <br>
        `;
    });
} // FIN FUNCION MOSTRAR

function editar(indice){ // FUNCION PARA EDITAR
    let nuevoNombre = prompt("Nuevo nombre:", contactos[indice].nombre);    // se obtiene el texto que se escribió en el input con id "buscar"
    let nuevaDireccion = prompt("Nueva direccion:", contactos[indice].direccion);
    let nuevoTelefono = prompt("Nuevo telefono:", contactos[indice].telefono);
    let nuevoCorreo = prompt("Nuevo correo:", contactos[indice].correo);
    let nuevaFoto = prompt("Nueva foto:", contactos[indice].foto);

    contactos[indice].nombre = nuevoNombre;    // se cambia el valor del texto que se escribió en el input con id "buscar"
    contactos[indice].direccion = nuevaDireccion;
    contactos[indice].telefono = nuevoTelefono;
    contactos[indice].correo = nuevoCorreo;
    contactos[indice].foto = nuevaFoto;

    localStorage.setItem("agenda", JSON.stringify(contactos));
    mostrar();
}

function eliminar(indice){    // FUNCION PARA ELIMINAR
    contactos.splice(indice,1);    
    localStorage.setItem("agenda", JSON.stringify(contactos));          // se elimina el contacto en la posición indicada
    mostrar();
}

function buscar(){    // FUNCION PARA BUSCAR
    let texto = document.getElementById("buscar").value.toLowerCase();     // se obtiene el texto que se escribió en el input con id "buscar"
    let lista = document.getElementById("lista");            
    lista.innerHTML = "";    // se limpia el contenido del elemento

    contactos.forEach(function(contacto){    
        if ( contacto.nombre.toLowerCase().includes(texto)) {        // se itera sobre cada contacto
            lista.innerHTML += `           
            <li>
            <b>${contacto.nombre}</b><br>
            Direccion: ${contacto.direccion}<br>
            Telefono: ${contacto.telefono}<br>
            Correo: ${contacto.correo}<br>
            <img src="${contacto.foto}" width="80">
            </li>
            <br>
            `;
        }
    });
}

function limpiar(){    // FUNCION PARA LIMPIAR
    contactos = []; 
    localStorage.removeItem("agenda");    // se elimina del almacenamiento
    mostrar(); 

    document.getElementById("nombre").value = "";        // se limpia el contenido del elemento
    document.getElementById("direccion").value = "";
    document.getElementById("telefono").value = "";    // se limpia el contenido del elemento   
    document.getElementById("correo").value = "";
    document.getElementById("foto").value = "";        // se limpia el contenido del elemento
    document.getElementById("buscar").value = "";
}

mostrar();          // se actualiza la pantalla

</script>

</body>
</html>
